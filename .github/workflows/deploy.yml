name: deploy
on:
  push:
    branches:
      - main

env:
  REGISTRY_ALIAS: m8q5m4u3
  REPOSITORY: xuanwu/obs-presign
  IMAGE_VERSION: latest

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-single-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # AWS login 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # -----------------------------
      # Build & push
      - name: Build & push image
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry || '' }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${IMAGE_VERSION}"
          IMAGE_BASE="$REGISTRY/${{ env.REGISTRY_ALIAS }}/${{ env.REPOSITORY }}"
          
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha,scope=presign \
            --cache-to type=gha,mode=max,scope=presign \
            --provenance=false \
            --sbom=false \
            -t "$IMAGE_BASE:$IMAGE_TAG" . \
            --push


